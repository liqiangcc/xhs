name: XHS Manage

on:
  workflow_dispatch:
    inputs:
      task:
        description: Task to run
        required: true
        type: choice
        options:
          - validate
          - migrate-check
          - index-check
          - canonical-check
          - canonical-suggest-hotspot
          - answer-validate
          - review-today
          - review-weak
      limit:
        description: Limit for review list or canonical suggestion tasks
        required: false
        default: "50"
      create_pr:
        description: Create a pull request for generated canonical candidates
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  run-task:
    if: ${{ inputs.task != 'canonical-suggest-hotspot' || !inputs.create_pr }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run selected task
        env:
          TASK: ${{ inputs.task }}
          LIMIT: ${{ inputs.limit }}
        run: |
          set -euo pipefail
          case "$TASK" in
            validate)
              npm run ci:check
              ;;
            migrate-check)
              npm run ci:migrate:check
              ;;
            index-check)
              npm run ci:index:check
              ;;
            canonical-check)
              npm run ci:canonical:check
              ;;
            canonical-suggest-hotspot)
              node scripts/xhs.js canonical suggest --hotspot --limit "$LIMIT" --noManifest
              ;;
            answer-validate)
              npm run ci:answer:validate
              ;;
            review-today)
              node scripts/xhs.js review today --limit "$LIMIT" --with-issues --noWrite
              ;;
            review-weak)
              node scripts/xhs.js review weak --limit "$LIMIT" --with-issues --noWrite
              ;;
            *)
              echo "Unsupported task: $TASK" >&2
              exit 1
              ;;
          esac

      - name: Upload canonical candidates
        if: ${{ inputs.task == 'canonical-suggest-hotspot' }}
        uses: actions/upload-artifact@v4
        with:
          name: canonical-candidates
          path: data/manifests/canonical/canonical_candidates.json
          if-no-files-found: error

      - name: Verify no generated changes
        if: ${{ inputs.task != 'canonical-suggest-hotspot' }}
        run: git diff --exit-code

  canonical-suggest-pr:
    if: ${{ inputs.task == 'canonical-suggest-hotspot' && inputs.create_pr }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate canonical candidates
        env:
          LIMIT: ${{ inputs.limit }}
        run: node scripts/xhs.js canonical suggest --hotspot --limit "$LIMIT" --noManifest

      - name: Upload canonical candidates
        uses: actions/upload-artifact@v4
        with:
          name: canonical-candidates
          path: data/manifests/canonical/canonical_candidates.json
          if-no-files-found: error

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: automation/canonical-suggest-hotspot-${{ github.run_id }}
        run: |
          set -euo pipefail
          if git diff --quiet -- data/manifests/canonical/canonical_candidates.json; then
            echo "No canonical candidate changes to propose."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/manifests/canonical/canonical_candidates.json
          git commit -m "chore: update canonical hotspot candidates"
          git push origin "$BRANCH"
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore: update canonical hotspot candidates" \
            --body "Generated by xhs-manage canonical-suggest-hotspot with limit=${LIMIT}."
